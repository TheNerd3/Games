<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake - Sol</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            border: 5px solid #333;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background: #000;
            max-width: 90vw;
            max-height: 70vh;
        }
        #ui {
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
        }
        .controles {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .btn-control {
            width: 60px;
            height: 60px;
            background: #222;
            border: 2px solid #00f2ff;
            color: white;
            border-radius: 10px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; }
        #btn-right { grid-column: 3; }
        #btn-down { grid-column: 2; }
    </style>
</head>
<body>

    <div id="ui">Puntos: <span id="score">0</span></div>
    <canvas id="snakeCanvas"></canvas>

    <div class="controles">
        <div class="btn-control" id="btn-up">↑</div>
        <div class="btn-control" id="btn-left">←</div>
        <div class="btn-control" id="btn-down">↓</div>
        <div class="btn-control" id="btn-right">→</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        // Configuración de la grilla
        const box = 20; 
        canvas.width = 400;
        canvas.height = 400;

        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
        let d = "RIGHT";
        let score = 0;
        let game;

        // Capturar controles (Teclado)
        document.addEventListener("keydown", direction);
        // Capturar controles (Celu)
        document.getElementById("btn-up").onclick = () => { if(d != "DOWN") d = "UP" };
        document.getElementById("btn-down").onclick = () => { if(d != "UP") d = "DOWN" };
        document.getElementById("btn-left").onclick = () => { if(d != "RIGHT") d = "LEFT" };
        document.getElementById("btn-right").onclick = () => { if(d != "LEFT") d = "RIGHT" };

        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar Snake
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f2ff" : "#0088ff";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00f2ff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Dibujar Comida
            ctx.fillStyle = "#ff0055";
            ctx.shadowColor = "#ff0055";
            ctx.fillRect(food.x, food.y, box, box);

            // Guardar posición vieja de la cabeza
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Mover la cabeza
            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // ¿Comió la comida?
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreEl.innerText = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop(); // Sacar la cola
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over (Paredes o morderse)
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("¡PERDISTE POR PETE! Puntos: " + score);
                location.reload();
            }

            snake.unshift(newHead); // Agregar nueva cabeza
        }

        // Ejecutar el juego cada 100 milisegundos
        game = setInterval(draw, 100);
    </script>
</body>
</html>
