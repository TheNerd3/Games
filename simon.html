<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Simon - Sol</title>
    <style>
        :root {
            --color-0: #00f2ff; /* Cian */
            --color-1: #ff00ff; /* Rosa */
            --color-2: #ffff00; /* Amarillo */
            --color-3: #00ff00; /* Verde */
        }

        body {
            margin: 0; background: #050505; color: white;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden; touch-action: none;
        }

        #ui { text-align: center; margin-bottom: 30px; }
        #score { font-size: 50px; font-weight: 900; color: var(--color-0); text-shadow: 0 0 20px var(--color-0); }

        /* EL PANEL CIRCULAR */
        #simon-board {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 300px; height: 300px; border-radius: 50%; padding: 20px;
            background: #111; border: 4px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .pad {
            border-radius: 20px; cursor: pointer; opacity: 0.3;
            transition: opacity 0.2s, transform 0.1s;
        }
        .pad:active { transform: scale(0.95); }
        .active { opacity: 1 !important; box-shadow: 0 0 30px currentColor; }

        #pad-0 { background: var(--color-0); color: var(--color-0); border-top-left-radius: 100px; }
        #pad-1 { background: var(--color-1); color: var(--color-1); border-top-right-radius: 100px; }
        #pad-2 { background: var(--color-2); color: var(--color-2); border-bottom-left-radius: 100px; }
        #pad-3 { background: var(--color-3); color: var(--color-3); border-bottom-right-radius: 100px; }

        #msg { margin-top: 20px; font-weight: bold; height: 24px; color: var(--color-1); }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100;
        }
        button {
            padding: 15px 40px; background: var(--color-0); border: none;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px var(--color-0); font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
        <div id="msg">¡Prestá atención!</div>
    </div>

    <div id="simon-board">
        <div class="pad" id="pad-0"></div>
        <div class="pad" id="pad-1"></div>
        <div class="pad" id="pad-2"></div>
        <div class="pad" id="pad-3"></div>
    </div>

    <div id="overlay">
        <h1 style="color: var(--color-0);">NEON SIMON</h1>
        <p>Repetí la secuencia de luces sin pifiarle.</p>
        <button id="btn-start">EMPEZAR</button>
    </div>

    <script>
        const pads = [
            document.getElementById('pad-0'),
            document.getElementById('pad-1'),
            document.getElementById('pad-2'),
            document.getElementById('pad-3')
        ];
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('msg');
        const overlay = document.getElementById('overlay');
        const btnStart = document.getElementById('btn-start');

        let sequence = [];
        let userSequence = [];
        let level = 0;
        let canPlay = false;

        function startGame() {
            sequence = [];
            level = 0;
            scoreEl.innerText = level;
            overlay.style.display = 'none';
            nextRound();
        }

        function nextRound() {
            userSequence = [];
            canPlay = false;
            level++;
            scoreEl.innerText = level - 1;
            msgEl.innerText = "Observando...";
            msgEl.style.color = "white";

            // Agregar un nuevo color aleatorio a la secuencia
            sequence.push(Math.floor(Math.random() * 4));
            playSequence();
        }

        async function playSequence() {
            for (let i = 0; i < sequence.length; i++) {
                await new Promise(r => setTimeout(r, 600));
                flashPad(sequence[i]);
            }
            await new Promise(r => setTimeout(r, 400));
            canPlay = true;
            msgEl.innerText = "¡Tu turno!";
            msgEl.style.color = "#00f2ff";
        }

        function flashPad(index) {
            pads[index].classList.add('active');
            setTimeout(() => {
                pads[index].classList.remove('active');
            }, 400);
        }

        function handlePadClick(index) {
            if (!canPlay) return;

            flashPad(index);
            userSequence.push(index);

            // Verificar si el último click fue correcto
            const currentIndex = userSequence.length - 1;
            if (userSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            // Si terminó la secuencia correctamente
            if (userSequence.length === sequence.length) {
                canPlay = false;
                setTimeout(nextRound, 1000);
            }
        }

        function gameOver() {
            canPlay = false;
            msgEl.innerText = "¡TE EQUIVOCASTE!";
            msgEl.style.color = "#ff00ff";
            
            setTimeout(() => {
                overlay.style.display = 'flex';
                document.querySelector('#overlay h1').innerText = "GAME OVER";
                document.querySelector('#overlay p').innerText = `Llegaste al nivel ${level - 1}. Nada mal, pete.`;
                btnStart.innerText = "REINTENTAR";
            }, 1000);
        }

        // Eventos
        pads.forEach((pad, index) => {
            pad.addEventListener('click', () => handlePadClick(index));
        });

        btnStart.addEventListener('click', startGame);

    </script>
</body>
</html>
